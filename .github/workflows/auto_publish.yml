name: Auto Publish Blog Posts by 손(Son/손민기)

on:
  push:
    branches:
      - develop
      - master
      - main
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      topic:
        description: '블로그 주제'
        required: false
        type: string
      categories:
        description: '카테고리'
        required: false
        default: 'Tech'
        type: string
      generate_image:
        description: '이미지 생성'
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.11'

jobs:
  # ============================================
  # 1단계: 블로그 포스트 자동 생성 (선택적)
  # ============================================
  generate-blog-post:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.topic != ''

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Required Python Packages
        run: |
          python -m pip install --upgrade pip
          pip install openai pillow requests

      - name: Generate Blog Post
        id: generate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python generate_blog_post.py \
            --topic "${{ github.event.inputs.topic }}" \
            --categories "${{ github.event.inputs.categories }}" \
            ${{ github.event.inputs.generate_image == 'true' && '--image' || '' }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "📝 Add new blog post: ${{ github.event.inputs.topic }}"
          title: "📝 [Blog] ${{ github.event.inputs.topic }}"
          body: |
            ## 자동 생성된 블로그 포스트

            - **주제**: ${{ github.event.inputs.topic }}
            - **카테고리**: ${{ github.event.inputs.categories }}
            - **이미지 생성**: ${{ github.event.inputs.generate_image }}

            ### 체크리스트
            - [ ] 내용 검토 완료
            - [ ] 코드 예시 동작 확인
            - [ ] 오탈자 수정
            - [ ] 이미지/링크 확인

            ---
            🤖 이 PR은 GitHub Actions에 의해 자동 생성되었습니다.
          branch: blog/${{ github.run_id }}
          labels: blog, auto-generated

  # ============================================
  # 2단계: 빌드 및 배포 (로컬 npm run deploy와 동일)
  # ============================================
  build-and-deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          CI: true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          cname: smk692.github.io

      - name: Notify Deployment Success
        run: |
          echo "🚀 Deployment completed successfully!"
          echo "📍 URL: https://smk692.github.io"

  # ============================================
  # 3단계: PR 빌드 테스트 (배포 없음)
  # ============================================
  build-test:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npm run build
        env:
          CI: true

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gatsby-public
          path: public/
          retention-days: 1

  # ============================================
  # 4단계: Lighthouse 성능 테스트 (PR만)
  # ============================================
  lighthouse:
    runs-on: ubuntu-latest
    needs: [build-test]
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: gatsby-public
          path: public/

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: './.lighthouserc.json'
        continue-on-error: true

      - name: Comment Lighthouse Results
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const results = JSON.parse(fs.readFileSync('.lighthouseci/manifest.json', 'utf8'));
              const summary = results[0]?.summary || {};

              const scores = {
                performance: Math.round((summary.performance || 0) * 100),
                accessibility: Math.round((summary.accessibility || 0) * 100),
                bestPractices: Math.round((summary['best-practices'] || 0) * 100),
                seo: Math.round((summary.seo || 0) * 100),
              };

              const comment = `## 🔍 Lighthouse 성능 리포트

              | 항목 | 점수 |
              |------|------|
              | ⚡ Performance | ${scores.performance} |
              | ♿ Accessibility | ${scores.accessibility} |
              | ✅ Best Practices | ${scores.bestPractices} |
              | 🔎 SEO | ${scores.seo} |

              > 80점 이상 권장`;

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            } catch (e) {
              console.log('Lighthouse results not found:', e.message);
            }
